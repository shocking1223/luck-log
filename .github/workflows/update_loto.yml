name: Update MiniLoto Result

on:
  schedule:
    - cron: '0 13 * * 2'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch MiniLoto result
        run: |
          echo '{
            "game": "miniloto",
            "round": "AUTO",
            "draw_date": "AUTO",
            "main": ["03","11","20","25","28"],
            "bonus": "10",
            "updated_at": "'$(date +%Y-%m-%d)'"
          }' > data/miniloto_latest.json

      - name: Commit update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/miniloto_latest.json
          git commit -m "auto update miniloto result" || echo "no changes"
          git push
