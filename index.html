<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>TAKARA</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    :root{
      --bg:#000;
      --card:#0f0f10;
      --muted:#9aa0a6;
      --text:#fff;
      --gold:#d4af37;
      --gold2:#b8942e;
      --line:#1f1f22;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -10%, rgba(212,175,55,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(212,175,55,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:6px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .coin{
      width:44px;height:44px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #ffe7a3, var(--gold) 45%, var(--gold2) 100%);
      box-shadow: 0 10px 30px rgba(212,175,55,.20);
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.12);
    }
    .coin span{
      font-weight:800;
      color:#000;
      letter-spacing:.06em;
      font-size:12px;
      transform: translateY(.5px);
    }
    h1{
      margin:0;
      font-size:28px;
      letter-spacing:.10em;
    }
    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      background: linear-gradient(180deg, rgba(212,175,55,.95), rgba(184,148,46,.95));
      color:#000;
      font-weight:800;
      letter-spacing:.04em;
      cursor:pointer;
      box-shadow: 0 10px 25px rgba(212,175,55,.18);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
    }
    .row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .value{
      font-size:20px;
      font-weight:800;
      letter-spacing:.02em;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      padding:10px 12px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      width:100%;
      justify-content:space-between;
    }
    .pill b{color:var(--gold); font-weight:900}
    .nums{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:8px;
    }
    .n{
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(15,15,16,.65);
      padding:10px 0;
      text-align:center;
      font-weight:800;
      letter-spacing:.04em;
    }
    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    .nav{
      position:sticky;
      bottom:0;
      margin-top:18px;
      background: rgba(0,0,0,.65);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:10px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      backdrop-filter: blur(10px);
    }
    .nav button{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      border-radius:12px;
      padding:12px 10px;
      font-weight:800;
      cursor:pointer;
    }
    .nav button.active{
      border-color: rgba(212,175,55,.50);
      box-shadow: 0 10px 25px rgba(212,175,55,.12);
    }
    .toast{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed rgba(212,175,55,.45);
      color:rgba(255,255,255,.9);
      background: rgba(212,175,55,.06);
      display:none;
    }
    @media (min-width:720px){
      .grid{grid-template-columns:1fr 1fr}
      .nav{grid-template-columns: repeat(3, 1fr)}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="coin"><span>TA</span></div>
        <div>
          <h1>TAKARA</h1>
          <div class="sub">資産管理アプリ風 / 宝くじログ</div>
        </div>
      </div>
      <button class="btn" id="btnCheck" onclick="checkResults()">CHECK</button>
    </div>

    <div class="grid" id="viewHome">
      <div class="card">
        <div class="row">
          <div>
            <div class="label">Mini Loto</div>
            <div class="value">購入 5口</div>
          </div>
          <div class="label">固定戦略</div>
        </div>

        <div class="pill">
          <span>次の抽選まで</span>
          <b id="countdown">あと -- 日</b>
        </div>

        <div class="hint">
          ※ ここは“見た目だけ”のデモ。次は「買い目保存 → 抽選結果取得 → 自動照合」を入れていく。
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="label">Numbers 4</div>
            <div class="value">購入 2口</div>
          </div>
          <div class="label">継続カウンター</div>
        </div>

        <div class="pill">
          <span>固定番号</span>
          <b>1232</b>
        </div>

        <div class="hint">
          次に「継続回数」「最高的中」「回収率」をここに出すと、TAKARAが“ゲーム化”する。
        </div>
      </div>

      <div class="card" style="grid-column:1/-1">
        <div class="row">
          <div>
            <div class="label">Today’s Pick (Demo)</div>
            <div class="value">ミニロト ①</div>
          </div>
          <div class="label">照合用UI</div>
        </div>
        <div class="nums" aria-label="numbers">
          <div class="n">03</div><div class="n">06</div><div class="n">11</div><div class="n">20</div><div class="n">27</div>
        </div>
        <div class="toast" id="toast">チェック（デモ）: 次は抽選結果を自動取得して照合する。</div>
      </div>
    </div>

    <div class="nav">
      <button class="active" id="navHome">HOME</button>
      <button id="navTickets">買い目</button>
      <button id="navStats">戦績</button>
    </div>
  </div>

<script>
  // ====== 設定（初期値）======
  const DEFAULT_MINI = [
    "03 06 11 20 27",
    "03 12 16 25 31",
    "06 11 20 28 31",
    "03 16 25 27 28",
    "11 16 20 25 28"
  ];
  const DEFAULT_N4 = ["1232","9941"];

  const KEY_MINI = "takara_mini5";
  const KEY_N4   = "takara_n4";

  // ====== 既存HTMLから要素を拾う（この画面のまま活かす）======
  const toast = document.getElementById('toast');
  const countdownEl = document.getElementById('countdown');

  // HOMEのデモ数字（03 06 11 20 27）を「保存データの1組目」で置き換える
  const demoNumEls = Array.from(document.querySelectorAll('.nums .n'));

  // いまは固定表示の「1232」をHTMLに直書きしてるので、後で差し替えしやすいように探す
  // （この画面では gold文字の <b>1232</b> が1個しかない想定）
  const n4Bold = Array.from(document.querySelectorAll('.pill b')).find(b => b.textContent.trim() === "1232") 
               || Array.from(document.querySelectorAll('.pill b'))[1];

  // ナビ
  const navBtns = [
    document.getElementById('navHome'),
    document.getElementById('navTickets'),
    document.getElementById('navStats')
  ];

  // ====== ユーティリティ ======
  const showToast = (msg) => {
    toast.style.display = 'block';
    toast.textContent = msg;
    setTimeout(()=> toast.style.display='none', 2200);
  };

  const parseNums = (line) => line.trim().split(/\s+/).map(x => x.padStart(2,"0"));

  const saveMini = (arr5) => localStorage.setItem(KEY_MINI, JSON.stringify(arr5));
  const loadMini = () => {
    const raw = localStorage.getItem(KEY_MINI);
    if (!raw) return DEFAULT_MINI;
    try {
      const v = JSON.parse(raw);
      return Array.isArray(v) && v.length ? v : DEFAULT_MINI;
    } catch { return DEFAULT_MINI; }
  };

  const saveN4 = (v) => localStorage.setItem(KEY_N4, JSON.stringify(v));
  const loadN4 = () => {
  const raw = localStorage.getItem(KEY_N4);
  if (!raw) return DEFAULT_N4;

  // 旧データ救済： "1232" だけ入ってたら 2口に拡張
  if (/^\d{4}$/.test(raw)) return [raw, "9941"];

  try {
    const v = JSON.parse(raw);
    // 配列じゃなかったら初期値
    if (!Array.isArray(v)) return DEFAULT_N4;
    // 1個しかなければ2個に拡張
    if (v.length === 1) return [v[0], "9941"];
    // 2個以上なら先頭2個だけ使う
    return [v[0], v[1]];
  } catch {
    return DEFAULT_N4;
  }
};

  // ====== カウントダウン（ミニロト：火曜）======
  function calcDaysToNextTuesday(){
    const now = new Date();
    const day = now.getDay(); // 0=日..2=火
    const target = 2;
    let diff = (target - day + 7) % 7;
    if(diff === 0) diff = 7;
    return diff;
  }
  countdownEl.textContent = `あと ${calcDaysToNextTuesday()} 日`;

  // ====== 表示反映 ======
  function renderHome(){
    const mini = loadMini();
    const first = parseNums(mini[0] || DEFAULT_MINI[0]);
    demoNumEls.forEach((el, i) => el.textContent = first[i] || "--");

const n4 = loadN4();
if (n4Bold) n4Bold.textContent = `${n4[0]} / ${n4[1]}`;
  }

  renderHome();

  // ====== CHECKボタン（まずは保存データを見せる）======
 document.getElementById('btnCheck').addEventListener('click', () => {
  const mini = loadMini();
  const input = prompt("ミニロト 当選番号を入力（5数字・スペース区切り）\n例：03 11 20 25 28");
  if (input === null) return;

  const win = input.trim().split(/\s+/).map(x => x.padStart(2,"0"));
  if (win.length !== 5) {
    showToast("当選番号は5個！");
    return;
  }

  const winSet = new Set(win);

  const result = mini.map((line, i) => {
    const nums = line.split(" ");
    const hit = nums.filter(n => winSet.has(n)).length;
    return `${i+1}組 ${nums.join(" ")} → ${hit}個一致`;
  });

  alert("当選番号\n" + win.join(" ") + "\n\n結果\n" + result.join("\n"));
});

  // ====== 買い目編集（超シンプル：promptで編集）======
  // nav「買い目」を押したら、5行入力できるようにする（スペース区切り）
  function editTickets(){
    const mini = loadMini();
    const input = prompt(
`ミニロト 5組を入力（1行=5数字、スペース区切り）
例：
03 06 11 20 27
03 12 16 25 31
...

現在：
${mini.join("\n")}

キャンセルで変更なし`, mini.join("\n")
    );
    if (input === null) return;

    const lines = input.split("\n").map(s => s.trim()).filter(Boolean);
    if (lines.length !== 5) {
      showToast("5行にしてね（5組）");
      return;
    }
    for (const ln of lines) {
      const nums = ln.split(/\s+/);
      if (nums.length !== 5) { showToast("1行は5数字にしてね"); return; }
    }
    saveMini(lines.map(l => l.replace(/\s+/g, " ")));
    renderHome();
    showToast("ミニロト5組を保存した");
  }

  function editN4(){
    const current = loadN4();
    const v = prompt("Numbers4 固定番号（4桁）を入力", current);
    if (v === null) return;
    const s = String(v).trim();
    if (!/^\d{4}$/.test(s)) { showToast("4桁の数字で！"); return; }
    saveN4(s);
    renderHome();
    {
  "game": "miniloto",
  "round": "",
  "draw_date": "",
  "main": ["00","00","00","00","00"],
  "bonus": "00",
  "updated_at": ""
}
    showToast("N4を保存した");
  }

  // navの挙動（HOME/買い目/戦績）
  navBtns.forEach(btn => btn.addEventListener('click', () => {
    navBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (btn.id === 'navTickets') {
      // まずミニロト編集→続けてN4編集
      editTickets();
      editN4();
      return;
    }
    if (btn.id === 'navStats') {
      showToast("戦績（次に実装）：総投資/総回収/回収率/当選回数");
      return;
    }
    showToast("HOME：保存した買い目が表示される");
  }));

  // Service Worker（あるなら）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
  <script>

const miniLotoPicks = [
[3,6,11,20,27],
[3,12,16,25,31],
[6,11,20,28,31],
[3,16,25,27,28],
[11,16,20,25,28]
];

const numbers4 = ["1232","9941"];

// 仮の抽選結果
const miniResult = [3,11,20,22,30];
const numbers4Result = "5678";

function checkResults(){

let text = "TAKARA 照合結果\n\n";

miniLotoPicks.forEach((pick,i)=>{

let match = pick.filter(n => miniResult.includes(n)).length;

text += `ミニロト${i+1} → ${match}個一致\n`;

});

numbers4.forEach(n=>{

if(n === numbers4Result){

text += `ナンバーズ4 ${n} → 当選\n`;

}else{

text += `ナンバーズ4 ${n} → はずれ\n`;

}

});

alert(text);

}

</script>
</body>
</html>
