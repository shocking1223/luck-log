<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>TAKARA</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    :root{
      --bg:#000;
      --card:#0f0f10;
      --muted:#9aa0a6;
      --text:#fff;
      --gold:#d4af37;
      --gold2:#b8942e;
      --line:#1f1f22;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -10%, rgba(212,175,55,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(212,175,55,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:6px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .coin{
      width:44px;height:44px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #ffe7a3, var(--gold) 45%, var(--gold2) 100%);
      box-shadow: 0 10px 30px rgba(212,175,55,.20);
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.12);
    }
    .coin span{
      font-weight:800;
      color:#000;
      letter-spacing:.06em;
      font-size:12px;
      transform: translateY(.5px);
    }
    h1{
      margin:0;
      font-size:28px;
      letter-spacing:.10em;
    }
    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      background: linear-gradient(180deg, rgba(212,175,55,.95), rgba(184,148,46,.95));
      color:#000;
      font-weight:800;
      letter-spacing:.04em;
      cursor:pointer;
      box-shadow: 0 10px 25px rgba(212,175,55,.18);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:18px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
    }
    .row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .value{
      font-size:20px;
      font-weight:800;
      letter-spacing:.02em;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      padding:10px 12px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      width:100%;
      justify-content:space-between;
    }
    .pill b{color:var(--gold); font-weight:900}
    .nums{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:8px;
    }
    .n{
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(15,15,16,.65);
      padding:10px 0;
      text-align:center;
      font-weight:800;
      letter-spacing:.04em;
    }
    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    .nav{
      position:sticky;
      bottom:0;
      margin-top:18px;
      background: rgba(0,0,0,.65);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:10px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      backdrop-filter: blur(10px);
    }
    .nav button{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      border-radius:12px;
      padding:12px 10px;
      font-weight:800;
      cursor:pointer;
    }
    .nav button.active{
      border-color: rgba(212,175,55,.50);
      box-shadow: 0 10px 25px rgba(212,175,55,.12);
    }
    .toast{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed rgba(212,175,55,.45);
      color:rgba(255,255,255,.9);
      background: rgba(212,175,55,.06);
      display:none;
    }
    @media (min-width:720px){
      .grid{grid-template-columns:1fr 1fr}
      .nav{grid-template-columns: repeat(3, 1fr)}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="coin"><span>TA</span></div>
        <div>
          <h1>TAKARA</h1>
          <div class="sub">資産管理アプリ風 / 宝くじログ</div>
        </div>
      </div>
      <button class="btn" id="btnCheck">CHECK</button>
    </div>

    <div class="grid" id="viewHome">
      <div class="card">
        <div class="row">
          <div>
            <div class="label">Mini Loto</div>
            <div class="value">購入 5口</div>
          </div>
          <div class="label">固定戦略</div>
        </div>

        <div class="pill">
          <span>次の抽選まで</span>
          <b id="countdown">あと -- 日</b>
        </div>

        <div class="hint">
          ※ ここは“見た目だけ”のデモ。次は「買い目保存 → 抽選結果取得 → 自動照合」を入れていく。
        </div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="label">Numbers 4</div>
            <div class="value">購入 2口</div>
          </div>
          <div class="label">継続カウンター</div>
        </div>

        <div class="pill">
          <span>固定番号</span>
          <b>1232</b>
        </div>

        <div class="hint">
          次に「継続回数」「最高的中」「回収率」をここに出すと、TAKARAが“ゲーム化”する。
        </div>
      </div>

      <div class="card" style="grid-column:1/-1">
        <div class="row">
          <div>
            <div class="label">Today’s Pick (Demo)</div>
            <div class="value">ミニロト ①</div>
          </div>
          <div class="label">照合用UI</div>
        </div>
        <div class="nums" aria-label="numbers">
          <div class="n">03</div><div class="n">06</div><div class="n">11</div><div class="n">20</div><div class="n">27</div>
        </div>
        <div class="toast" id="toast">チェック（デモ）: 次は抽選結果を自動取得して照合する。</div>
      </div>
    </div>

    <div class="nav">
      <button class="active" id="navHome">HOME</button>
      <button id="navTickets">買い目</button>
      <button id="navStats">戦績</button>
    </div>
  </div>

  <script>
    // --- 小ネタ：次の抽選まで（デモ） ---
    // ミニロトは毎週火曜。今日から次の火曜までの日数をざっくり出す。
    const countdownEl = document.getElementById('countdown');
    function calcDaysToNextTuesday(){
      const now = new Date();
      const day = now.getDay(); // 0=日..2=火
      const target = 2;
      let diff = (target - day + 7) % 7;
      if(diff === 0) diff = 7;
      return diff;
    }
    countdownEl.textContent = `あと ${calcDaysToNextTuesday()} 日`;

    // --- ボタン操作（デモ） ---
    const toast = document.getElementById('toast');
    document.getElementById('btnCheck').addEventListener('click', () => {
      toast.style.display = 'block';
      toast.textContent = 'チェック（デモ）: 次は抽選結果を自動取得して照合する。';
      setTimeout(()=> toast.style.display='none', 2200);
    });

    // ナビは今は見た目だけ
    const navBtns = [
      document.getElementById('navHome'),
      document.getElementById('navTickets'),
      document.getElementById('navStats')
    ];
    navBtns.forEach(btn => btn.addEventListener('click', () => {
      navBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // デモ：トーストで次に作る機能を出す
      toast.style.display = 'block';
      toast.textContent = btn.id === 'navTickets'
        ? '買い目画面（次に実装）: 5組・2組を保存して編集できるようにする。'
        : btn.id === 'navStats'
          ? '戦績画面（次に実装）: 総投資/総回収/回収率/当選回数を出す。'
          : 'HOME: まずは見た目完成。次は当選結果の自動取得へ。';
      setTimeout(()=> toast.style.display='none', 2400);
    }));

    // Service Worker（あるなら）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
